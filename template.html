<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} — Aristotle Wiki</title>
    <style>
      body { max-width: 46rem; margin: 2rem auto; padding: 0 1rem; font-family: Georgia, 'Times New Roman', serif; line-height: 1.6; color: #222; }
      h1, h2, h3 { font-family: -apple-system, Helvetica, Arial, sans-serif; }
      a { color: #7a2e2e; }
      code, pre { font-family: 'SF Mono', Menlo, Consolas, monospace; }
      pre { overflow-x: auto; background: #f6f4f0; padding: 0.75rem; border-radius: 4px; }
      blockquote { border-left: 3px solid #ccc; margin-left: 0; padding-left: 1rem; color: #444; }
      nav.mdsite-nav { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #ddd; font-family: -apple-system, Helvetica, Arial, sans-serif; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    {{content}}
    <nav class="mdsite-nav">
      {{home}} | {{up}} | {{prev}} | {{next}}
    </nav>
  </body>
</html>
